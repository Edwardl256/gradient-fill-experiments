<html>
<body>
<canvas id="pic" style="position:absolute;left:0px;top:0px;" width="4096px" height="2304px"></canvas>
<div id="p" style="position:absolute;border-width:3px;border-style:ridge;width:5px;height:5px;"></div>
<script>
	var canvas;
	var ctx;
	var img = new Image();
	var imgdata;
	var x0;
	var y0;
	var x1;
	var y1;
	var dir;
	var ss = 0;
	var pass = 0;
	var color0 = [];
	var shape = [];
	var stoploop1 = true;
	var stoploop2 = true;
	var bbox = [65536,65536,0,0];
	onload = function()
	{
		canvas = document.getElementById("pic");
		ctx = canvas.getContext("2d");
		img.src = "raritydashserendipity.png";
		canvas.onclick = function(e)
		{
			x0 = e.layerX;
			y0 = e.layerY;
			dir = 0;
			shape = [];
			var color1 = color0[y0][x0];
			while(x0 > 0 && color1.toString() == color0[y0][x0-1].toString())
			{
				x0--;
				color1 = color0[y0][x0];
			}
			x1 = x0;
			y1 = y0;
			stoploop1 = false;
			requestAnimationFrame(traceme);
		}
	}
	img.onload = function()
	{
		ctx.drawImage(img,0,0);
		var id = ctx.getImageData(0,0,4096,2304).data;
		var i = 0;
		for(var y = 0; y < 2304; y++)
		{
			color0[y] = [];
			for(var x = 0; x < 4096; x++)
			{
				color0[y][x] = [id[i],id[i+1],id[i+2],id[i+3]];
				i += 4;
			}
		}
	}
	var traceme = function()
	{
		while(stoploop1 == false)
		{
			if(dir == 0)
			{	// up
				if(x1 > 0 && color0[y1][x1-1].toString() == color0[y0][x0].toString())
				{
					dir = 3;
					x1--;
				}
				else if(y1 > 0 && color0[y1-1][x1].toString() == color0[y0][x0].toString())
				{
					dir = 0;
					y1--;
				}
				else if(x1 < 4096 && color0[y1][x1+1].toString() == color0[y0][x0].toString())
				{
					dir = 1;
					x1++;
				}
				else
				{
					dir = 2;
					y1++;
				}
			}
			else if(dir == 1)
			{	// right
				if(y1 > 0 && color0[y1-1][x1].toString() == color0[y0][x0].toString())
				{
					dir = 0;
					y1--;
				}
				else if(x1 < 4096 && color0[y1][x1+1].toString() == color0[y0][x0].toString())
				{
					dir = 1;
					x1++;
				}
				else if(y1 < 2304 && color0[y1+1][x1].toString() == color0[y0][x0].toString())
				{
					dir = 2;
					y1++;
				}
				else
				{
					dir = 3;
					x1--;
				}
			}
			else if(dir == 2)
			{	// down
				if(x1 < 4096 && color0[y1][x1+1].toString() == color0[y0][x0].toString())
				{
					dir = 1;
					x1++;
				}
				else if(y1 < 2304 && color0[y1+1][x1].toString() == color0[y0][x0].toString())
				{
					dir = 2;
					y1++;
				}
				else if(x1 > 0 && color0[y1][x1-1].toString() == color0[y0][x0].toString())
				{
					dir = 3;
					x1--;
				}
				else
				{
					dir = 0;
					y1--;
				}
			}
			else if(dir == 3)
			{	// left
				if(y1 < 2304 && color0[y1+1][x1].toString() == color0[y0][x0].toString())
				{
					dir = 2;
					y1++;
				}
				else if(x1 > 0 && color0[y1][x1-1].toString() == color0[y0][x0].toString())
				{
					dir = 3;
					x1--;
				}
				else if(y1 > 0 && color0[y1-1][x1].toString() == color0[y0][x0].toString())
				{
					dir = 0;
					y1--;
				}
				else
				{
					dir = 1;
					x1++;
				}
			}
			shape.push({x1: x1,y1: y1});
/*			var pix = document.createElement("div");
			pix.style.backgroundColor = "#0000FF";
			pix.style.position = "absolute";
			pix.style.left = x1 + "px";
			pix.style.top = y1 + "px";
			pix.style.width = "1px";
			pix.style.height = "1px";
			document.body.appendChild(pix);*/
			ctx.fillStyle = "rgb(0,0,255)";
			ctx.fillRect(x1,y1,1,1);
			if(x1 == x0 && y1 == y0)
			{
				stoploop1 = true;
				stoploop2 = false;
				console.log(shape.length);
				if(pass == 0)
				{
					for(var i = 0; i < shape.length; i++)
					{
						if(shape[i].x1 < bbox[0])
							bbox[0] = shape[i].x1;
						if(shape[i].x1 > bbox[2])
							bbox[2] = shape[i].x1;
						if(shape[i].y1 < bbox[1])
							bbox[1] = shape[i].y1;
						if(shape[i].y1 > bbox[3])
							bbox[3] = shape[i].y1;
					}
				}
				pass++;
				requestAnimationFrame(findpairs);
			}
			else
			{
				//requestAnimationFrame(traceme);
				//traceme();
			}
		}
	}
	var findpairs = function()
	{
		while(stoploop2 == false)
		{
			x0 = shape[ss].x1;
			y0 = shape[ss].y1;
			x1 = x0;
			y1 = y0;
			var mat9 = [];
			if(color0[y0-1] == undefined)
				mat9[0] = false;
			else if(color0[y0-1][x0-1] == undefined)
				mat9[0] = false;
			else if(color0[y0-1][x0-1].toString() != color0[y0][x0].toString())
				mat9[0] = false;
			else
				mat9[0] = true;
	
			if(color0[y0-1] == undefined)
				mat9[1] = false;
			else if(color0[y0-1][x0] == undefined)
				mat9[1] = false;
			else if(color0[y0-1][x0].toString() != color0[y0][x0].toString())
				mat9[1] = false;
			else
				mat9[1] = true;
	
			if(color0[y0-1] == undefined)
				mat9[2] = false;
			else if(color0[y0-1][x0+1] == undefined)
				mat9[2] = false;
			else if(color0[y0-1][x0+1].toString() != color0[y0][x0].toString())
				mat9[2] = false;
			else
				mat9[2] = true;
	
			if(color0[y0][x0-1] == undefined)
				mat9[3] = false;
			else if(color0[y0][x0-1].toString() != color0[y0][x0].toString())
				mat9[3] = false;
			else
				mat9[3] = true;
	
			if(color0[y0][x0+1] == undefined)
				mat9[5] = false;
			else if(color0[y0][x0+1].toString() != color0[y0][x0].toString())
				mat9[5] = false;
			else
				mat9[5] = true;
	
			if(color0[y0+1] == undefined)
				mat9[6] = false;
			if(color0[y0+1][x0-1] == undefined)
				mat9[6] = false;
			else if(color0[y0+1][x0-1].toString() != color0[y0][x0].toString())
				mat9[6] = false;
			else
				mat9[6] = true;
	
			if(color0[y0+1] == undefined)
				mat9[7] = false;
			else if(color0[y0+1][x0] == undefined)
				mat9[7] = false;
			else if(color0[y0+1][x0].toString() != color0[y0][x0].toString())
				mat9[7] = false;
			else
				mat9[7] = true;
	
			if(color0[y0+1] == undefined)
				mat9[8] = false;
			else if(color0[y0+1][x0+1] == undefined)
				mat9[8] = false;
			else if(color0[y0+1][x0+1].toString() != color0[y0][x0].toString())
				mat9[8] = false;
			else
				mat9[8] = true;
	
			if(mat9[1] == true && mat9[7] == false)
				dir = 0; // up
			else if(mat9[3] == false && mat9[5] == true)
				dir = 1; // right
			else if(mat9[1] == false && mat9[7] == true)
				dir = 2; // down
			else if(mat9[3] == true && mat9[5] == false)
				dir = 3; // left
	
			dist = 0;
			var found = false;
			while(x1 > bbox[0] && x1 < bbox[2] && y1 > bbox[1] && y1 < bbox[3] && found == false && color0[y1][x1].toString() == color0[y0][x0].toString())
			{
				dist++;
				if(dir == 0)
				{	// up
					y1--;
				}
				else if(dir == 1)
				{	// right
					x1++;
				}
				else if(dir == 2)
				{	// down
					y1++;
				}
				else if(dir == 3)
				{	// left
					x1--;
				}
				for(var i = 0; i < shape.length; i++)
				{
					if(i != ss && x1 == shape[i].x1 && y1 == shape[i].y1)
					{
						found = true;
						i = shape.length;
					}
				}
			}
			if(found == false)
			{
				stoploop2 = true;
				stoploop1 = false;
				document.getElementById("p").style.left = (x1-5) + "px";
				document.getElementById("p").style.top = (y1-5) + "px";
				if(dir == 0)
				{	// up
					y1++;
				}
				else if(dir == 1)
				{	// right
					x1--;
				}
				else if(dir == 2)
				{	// down
					y1--;
				}
				else if(dir == 3)
				{	// left
					x1++;
				}
				shape[ss].x2 = x1;
				shape[ss].y2 = y1;
				shape[ss].dist = dist;
				shape[ss].dir = dir;
				if(x0 < bbox[0])
					x0 = bbox[0];
				else if(x0 > bbox[2])
					x0 = bbox[2];
				else if(y0 < bbox[1])
					y0 = bbox[1];
				else if(y0 > bbox[3])
					y0 = bbox[3];
				x1 = x0;
				y1 = y0;
				ss++;
				requestAnimationFrame(traceme);
			}
			else
			{
				shape[ss].x2 = x1;
				shape[ss].y2 = y1;
				shape[ss].dist = dist;
				ss++;
				if(ss >= shape.length)
				{
					stoploop2 = true;
					stoploop1 = true;
					console.log("END");
					console.log(shape);
				}
			}
		}
	}






</script>
</body>
</html>
