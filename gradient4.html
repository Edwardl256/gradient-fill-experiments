<html>
<body>
<canvas id="pic" style="position:absolute;left:0px;top:0px;" width="4096px" height="2304px"></canvas>
<script>
	var canvas;
	var ctx;
	var img = new Image();
	var imgdata;
	var x0;
	var y0;
	var x1;
	var y1;
	var dir;
	var distX;
	var distY;
	var sx;
	var sy;

	var r0 = 0;
	var g0 = 0;
	var b0 = 255;
	var r2 = 0;
	var g2 = 255;
	var b2 = 255;

	var color0 = [];
	var shape = [];
	var bbox = [65536,65536,0,0];
	onload = function()
	{
		canvas = document.getElementById("pic");
		ctx = canvas.getContext("2d");
		img.src = "raritydashserendipity.png";
		//img.src = "coverB.png";
		canvas.onclick = function(e)
		{
			x0 = e.layerX;
			y0 = e.layerY;
			dir = 0;
			bbox = [65536,65536,0,0];
			shape = [];
			var color1 = color0[y0][x0];
			while(x0 > 0 && color1.toString() == color0[y0][x0-1].toString())
			{
				x0--;
				color1 = color0[y0][x0];
			}
			x1 = x0;
			y1 = y0;
			requestAnimationFrame(traceme);
		}
	}
	img.onload = function()
	{
		ctx.drawImage(img,0,0);
		var id = ctx.getImageData(0,0,4096,2304).data;
		var i = 0;
		for(var y = 0; y < 2304; y++)
		{
			color0[y] = [];
			for(var x = 0; x < 4096; x++)
			{
				color0[y][x] = [id[i],id[i+1],id[i+2],id[i+3]];
				i += 4;
			}
		}
	}
	var traceme = function()
	{
		if(dir == 0)
		{	// up
			if(x1 > 0 && color0[y1][x1-1].toString() == color0[y0][x0].toString())
			{
				dir = 3;
				x1--;
			}
			else if(y1 > 0 && color0[y1-1][x1].toString() == color0[y0][x0].toString())
			{
				dir = 0;
				y1--;
			}
			else if(x1 < 4095 && color0[y1][x1+1].toString() == color0[y0][x0].toString())
			{
				dir = 1;
				x1++;
			}
			else
			{
				dir = 2;
				y1++;
			}
		}
		else if(dir == 1)
		{	// right
			if(y1 > 0 && color0[y1-1][x1].toString() == color0[y0][x0].toString())
			{
				dir = 0;
				y1--;
			}
			else if(x1 < 4095 && color0[y1][x1+1].toString() == color0[y0][x0].toString())
			{
				dir = 1;
				x1++;
			}
			else if(y1 < 2303 && color0[y1+1][x1].toString() == color0[y0][x0].toString())
			{
				dir = 2;
				y1++;
			}
			else
			{
				dir = 3;
				x1--;
			}
		}
		else if(dir == 2)
		{	// down
			if(x1 < 4095 && color0[y1][x1+1].toString() == color0[y0][x0].toString())
			{
				dir = 1;
				x1++;
			}
			else if(y1 < 2303 && color0[y1+1][x1].toString() == color0[y0][x0].toString())
			{
				dir = 2;
				y1++;
			}
			else if(x1 > 0 && color0[y1][x1-1].toString() == color0[y0][x0].toString())
			{
				dir = 3;
				x1--;
			}
			else
			{
				dir = 0;
				y1--;
			}
		}
		else if(dir == 3)
		{	// left
			if(y1 < 2303 && color0[y1+1][x1].toString() == color0[y0][x0].toString())
			{
				dir = 2;
				y1++;
			}
			else if(x1 > 0 && color0[y1][x1-1].toString() == color0[y0][x0].toString())
			{
				dir = 3;
				x1--;
			}
			else if(y1 > 0 && color0[y1-1][x1].toString() == color0[y0][x0].toString())
			{
				dir = 0;
				y1--;
			}
			else
			{
				dir = 1
				x1++;
			}
		}
		shape.push([x1,y1]);
/*		var pix = document.createElement("div");
		pix.style.backgroundColor = "#0000FF";
		pix.style.position = "absolute";
		pix.style.left = x1 + "px";
		pix.style.top = y1 + "px";
		pix.style.width = "1px";
		pix.style.height = "1px";
		document.body.appendChild(pix);*/
		ctx.fillStyle = "rgb(0,0,255)";
		ctx.fillRect(x1,y1,1,1);
		if(x1 == x0 && y1 == y0)
		{
			console.log(shape);
			for(var i = 0; i < shape.length; i++)
			{
				if(shape[i][0] < bbox[0])
					bbox[0] = shape[i][0];
				if(shape[i][0] > bbox[2])
					bbox[2] = shape[i][0];
				if(shape[i][1] < bbox[1])
					bbox[1] = shape[i][1];
				if(shape[i][1] > bbox[3])
					bbox[3] = shape[i][1];
			}

			x1 = bbox[0];
			y1 = bbox[1];
			requestAnimationFrame(stickouts);
		}
		else
		{
			try
			{
				traceme();
			}
			catch(e)
			{
				requestAnimationFrame(traceme);
			}
		}
	}
	var stickouts = function()
	{
		sx = false;
		var x2 = x1;
		var x3 = x1;
		var x4 = x1;
		var y2 = y1;
		var y3 = y1;
		var y4 = y1;
		while(x2 < bbox[2])
		{
			if(color0[y1][x2].toString() == color0[y0][x0].toString())
			{
				if(sx == false)
				{
					sx = true;
					x3 = x2;
				}
			}
			else
			{
				if(sx == true)
				{
					sx = false;
					x4 = x2;
					distX = Math.abs(x4-x3);
					for(var x = 0; x < distX; x++)
					{
						y2 = y1;
						while(color0[y2][x3+x].toString() == color0[y0][x0].toString() && y2>bbox[1])
							y2--;
						y3 = y2;
						y2 = y1;
						while(color0[y2][x3+x].toString() == color0[y0][x0].toString() && y2<bbox[3])
							y2++;
						y4 = y2;
						distY = Math.abs(y4-y3);
						var r1 = r0 + ( (r2-r0) * Math.sin(x/distX*Math.PI) * Math.sin(y1/distY*Math.PI) );
						var g1 = g0 + ( (g2-g0) * Math.sin(x/distX*Math.PI) * Math.sin(y1/distY*Math.PI) );
						var b1 = b0 + ( (b2-b0) * Math.sin(x/distX*Math.PI) * Math.sin(y1/distY*Math.PI) );
						ctx.fillStyle = "rgb(" + r1 + "," + g1 + "," + b1 + ")";
						ctx.fillRect(x3+x,y1,1,1);
					}
				}
			}
			x2++;
		}
		if(sx == true)
		{
			sx = false;
			x4 = x2;
			distX = Math.abs(x4-x3);
			for(var x = 0; x < distX; x++)
			{
				y2 = y1;
				while(color0[y2][x3+x].toString() == color0[y0][x0].toString() && y2>bbox[1])
					y2--;
				y3 = y2;
				y2 = y1;
				while(color0[y2][x3+x].toString() == color0[y0][x0].toString() && y2<bbox[3])
					y2++;
				y4 = y2;
				distY = Math.abs(y4-y3);
				var r1 = r0 + ( (r2-r0) * Math.sin(x/distX*Math.PI) * Math.sin(y1/distY*Math.PI) );
				var g1 = g0 + ( (g2-g0) * Math.sin(x/distX*Math.PI) * Math.sin(y1/distY*Math.PI) );
				var b1 = b0 + ( (b2-b0) * Math.sin(x/distX*Math.PI) * Math.sin(y1/distY*Math.PI) );
				ctx.fillStyle = "rgb(" + r1 + "," + g1 + "," + b1 + ")";
				ctx.fillRect(x3+x,y1,1,1);
			}
		}
		y1++;
		if(y1 < bbox[3])
			requestAnimationFrame(stickouts);
			//stickouts();
	}







</script>
</body>
</html>
