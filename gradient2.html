			dir = [0.5,1];
		} else
		if(mat9[0] == false &&	mat9[1] == false 				// XX 
		&& mat9[3] == true		&&		mat9[5] == false	// O·X
		&& mat9[6] == true &&	mat9[7] == true &&	mat9[8] == true)	// OOO
		{	// SSW
			dir = [-0.5,1];
		} else
		if(mat9[0] == true &&	mat9[1] == true &&	mat9[1] == true		// OOO
		&& mat9[3] == false		&&		mat9[5] == true		// X·O
				   &&	mat9[7] == false &&	mat9[8] == false)	//  XX
		{	// NNE
			dir = [0.5,-1];
		} else
		if(mat9[0] == true &&	mat9[1] == true &&	mat9[1] == true		// OOO
		&& mat9[3] == true		&&		mat9[5] == false	// O·X
		&& mat9[6] == false &&	mat9[7] == false)				// XX 
		{	// NNW
			dir = [0.5,-1];
		} else
		if(mat9[0] == false &&	mat9[1] == true &&	mat9[1] == true		// XOO
		&& mat9[3] == false		&&		mat9[5] == true		// X·O
				   &&	mat9[7] == false &&	mat9[8] == true)	//  XO
		{	// NEE
			dir = [1,-0.5];
		} else
		if(			mat9[1] == false &&	mat9[1] == true		//  XO
		&& mat9[3] == false		&&		mat9[5] == true		// X·O
		&& mat9[6] == false &&	mat9[7] == true &&	mat9[8] == true)	// XOO
		{	// SEE
			dir = [1,0.5];
		} else
		if(mat9[0] == true &&	mat9[1] == true &&	mat9[1] == false	// OOX
		&& mat9[3] == true		&&		mat9[5] == false	// O·X
		&& mat9[6] == true &&	mat9[7] == false)				// OX 
		{	// NWW
			dir = [-1,-0.5];
		} else
		if(mat9[0] == true &&	mat9[1] == false				// OX 
		&& mat9[3] == true		&&		mat9[5] == false	// O·X
		&& mat9[6] == true &&	mat9[7] == true &&	mat9[8] == false)	// OOX
		{	// SWW
			dir = [-1,0.5];
		}

		if(dir[0] != 0 || dir[1] != 0)
		{
			dist = 0;
			while(x1 > 0 && x1 < 4096 && y1 > 0 && y1 < 2304 && color0[Math.floor(y1)][Math.floor(x1)].toString() == color0[y0][x0].toString())
			{
				dist++;
				x1+=dir[0];
				y1+=dir[1];
			}
			if(dist > 1)
			{
				x1 = x0;
				y1 = y0;
				var gr = 0;
				for(var i = 0; i < dist/2; i++)
				{
					x1+=dir[0];
					y1+=dir[1];
					gr = Math.floor((i/(dist/2)) * 256);
					ctx.fillStyle = "rgb(0," + gr + ",255)";
					ctx.fillRect(x1,y1,1,1);
				}
				for(var i = 0; i < dist/2; i++)
				{
					x1+=dir[0];
					y1+=dir[1];
					gr = Math.floor((i/(dist/2)) * 256);
					ctx.fillStyle = "rgb(0," + (256-gr) + ",255)";
					ctx.fillRect(x1,y1,1,1);
				}
			}
		}
		ss++;
		if(ss < shape.length)
			requestAnimationFrame(stickouts);
			//stickouts();
	}
